<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOAT BEER</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:white;
    color:#000;
}

/* +18 OVERLAY */
.age-overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:black;
    color:white;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    z-index:9999;
    padding:20px;
}

.age-overlay h1{
    font-size:28px;
    margin-bottom:30px;
}

.age-overlay button{
    margin:15px;
    padding:18px 45px;
    border:none;
    font-weight:bold;
    font-size:18px;
    cursor:pointer;
    border-radius:6px;
}

.btn-yes{
    background:#c9a227;
    color:black;
}

.btn-no{
    background:#444;
    color:white;
}

.banner{
    width:100%;
    height:100vh;
    background:url('banner.jpeg') center/cover no-repeat;
}

/* PADRÃO SLIDER */
.slider-section{
    padding:60px 20px;
    text-align:center;
}

.slider-container{
    display:flex;
    overflow-x:auto;
    scroll-snap-type:x mandatory;
    gap:20px;
}

.slider-container::-webkit-scrollbar{
    display:none;
}

.slide{
    min-width:90%;
    scroll-snap-align:center;
    display:flex;
    flex-direction:column;
    align-items:center;
}

.gold-box{
    border:2px solid #c9a227;
    padding:25px;
    border-radius:10px;
    background:white;
    width:320px;
    height:280px;
    display:flex;
    flex-direction:column;
    justify-content:center;
}

.gold-box h2{
    color:#c9a227;
    margin-bottom:15px;
}

.gold-box p{
    font-size:14px;
    line-height:1.5;
}

.arrow{
    margin-top:20px;
    font-weight:bold;
    color:#c9a227;
    animation:blink 1.2s infinite;
}

@keyframes blink{
    50%{opacity:0.3;}
}

.beer-img{
    width:280px;
    margin-bottom:20px;
}

@media(min-width:768px){
    .slide{
        flex-direction:row;
        justify-content:center;
        gap:40px;
    }

    .beer-img{
        margin-bottom:0;
    }
}
</style>
</head>

<body>

<!-- +18 VERIFICAÇÃO -->
<div class="age-overlay" id="ageCheck">
    <h1>Você tem 18 anos ou mais?<br>Sim ou Não?</h1>
    <div>
        <button class="btn-yes" onclick="enterSite()">SIM</button>
        <button class="btn-no" onclick="denyAccess()">NÃO</button>
    </div>
</div>

<script>
function enterSite(){
    document.getElementById("ageCheck").style.display="none";
}
function denyAccess(){
    window.location.href="https://www.google.com";
}
</script>

<!-- BANNER -->
<div class="banner"></div>

<!-- (SEÇÕES ANTERIORES MANTIDAS IGUAL — OMITIDAS AQUI PARA ENCURTAR EXPLICAÇÃO) -->
<!-- MANTENHA TODAS AS SUAS SEÇÕES ACIMA EXATAMENTE COMO ESTÃO -->

<!-- ======================= -->
<!-- NOVA SEÇÃO - LATAS -->
<!-- ======================= -->

<section class="slider-section">
<div class="slider-container">

<div class="slide">
<img src="lata1.jpeg" class="beer-img">
</div>

<div class="slide">
<img src="lata2.jpeg" class="beer-img">
</div>

<div class="slide">
<img src="lata3.jpeg" class="beer-img">
</div>

<div class="slide">
<div class="gold-box">
<h2>Linha GOAT BEER em Latas</h2>
<p>
A mesma excelência e padrão artesanal agora em embalagem prática e moderna.<br><br>
Design marcante, conservação ideal e a experiência GOAT BEER pronta para qualquer ocasião.<br><br>
Qualidade, autenticidade e atitude — agora em lata.
</p>
</div>
</div>

</div>
<div class="arrow">← ARRASTE →</div>
</section>

</body>
</html>
