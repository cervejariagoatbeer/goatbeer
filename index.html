<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOAT BEER</title>
<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:white;
    color:#000;
}

/* +18 OVERLAY */
.age-overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:black;
    color:white;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    z-index:9999;
    padding:20px;
}

.age-overlay h1{
    font-size:36px;
    color:#c9a227; /* amarelo GOAT BEER */
    margin-bottom:15px;
}

.age-overlay p{
    font-size:20px;
    color:white;
    margin-bottom:30px;
}

.age-overlay button{
    margin:10px;
    padding:15px 40px;
    border:none;
    font-weight:bold;
    font-size:18px;
    cursor:pointer;
    border-radius:6px;
}

.btn-yes{
    background:#c9a227;
    color:black;
}

.btn-no{
    background:#444;
    color:white;
}

/* BANNER */
.banner{
    width:100%;
    height:100vh;
    background:url('capa01.jpeg') center/cover no-repeat;
}
</style>
</head>
<body>

<!-- +18 VERIFICAÇÃO -->
<div class="age-overlay" id="ageCheck">
    <h1>GOAT BEER</h1>
    <p>Você tem mais de 18 anos?</p>
    <div>
        <button class="btn-yes" onclick="enterSite()">SIM</button>
        <button class="btn-no">NÃO</button>
    </div>
</div>

<script>
function enterSite(){
    document.getElementById("ageCheck").style.display="none";
}
</script>

<!-- BANNER -->
<div class="banner"></div>

</body>
</html>
